services:
  - type: web
    name: after5-pipeline
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      python -m examples.demo_seed_if_empty
      gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 after5.webapp.app:app
    autoDeploy: true
    envVars:
      - key: APP_PASSWORD
        sync: false          # set in Render dashboard; never committed to git
      - key: APP_PASSWORD_HASH
        sync: false          # optional, takes precedence over APP_PASSWORD
      - key: FLASK_SECRET_KEY
        generateValue: true  # Render auto-generates a secret once
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HOST
        value: "0.0.0.0"
      - key: DEMO_SEED
        value: "1"           # SET TO 0 for production once you've loaded real data
