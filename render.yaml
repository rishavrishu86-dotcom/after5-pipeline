services:
  - type: web
    name: after5-pipeline
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      python -m examples.demo_seed_if_empty
      gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 after5.webapp.app:app
    autoDeploy: true
    envVars:
      - key: APP_PASSWORD
        value: "change-me"   # rotate from Render dashboard after first boot
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HOST
        value: "0.0.0.0"
